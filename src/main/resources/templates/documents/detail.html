<!DOCTYPE html>
<html th:lang="${#locale.language}" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout}">
<head>
    <title th:text="#{doc.details.page.title(${document.name})}">Document Detail</title>
    <th:block layout:fragment="page-specific-head">
        <link rel="stylesheet" href="/css/dashboard.css">
        <link rel="stylesheet" href="/css/documents.css">
    </th:block>
</head>

<body layout:fragment="content">
<div class="container my-4">

    <div class="page-header d-flex justify-content-between align-items-center mb-4">
        <div>
            <a th:href="@{/documents}" class="text-muted small text-decoration-none">
                <i class="fa-solid fa-arrow-left me-1"></i> <span th:text="#{doc.details.back}">Back to Documents</span>
            </a>
            <div class="page-title mt-2" th:text="#{doc.details.header}">Document Details</div>
            <div class="page-subtitle" th:text="#{doc.details.subtitle}">View metadata and manage this file</div>
        </div>
        <span class="status-badge status-active" th:text="${document.documentType}">RECEIPT</span>
    </div>

    <div class="error-box" id="errorBox" style="display:none;">
        <i class="fa-solid fa-circle-exclamation me-2"></i>
        <span id="errorMsg"></span>
    </div>

    <div class="row">
        <div class="col-lg-8">
            <div class="glass-card p-4 mb-4 shadow-sm">
                <div class="doc-header-row mb-4 pb-4 border-bottom d-flex align-items-center">
                    <div class="doc-big-icon me-4"
                         th:classappend="${document.documentType == 'PDF' ? 'pdf' : 'img'}"
                         style="width: 80px; height: 80px; display: flex; align-items: center; justify-content: center; border-radius: 12px; font-size: 2rem;">
                        <i class="fa-solid" th:classappend="${document.documentType == 'PDF' ? 'fa-file-pdf' : 'fa-image'}"></i>
                    </div>
                    <div>
                        <h4 class="mb-1 fw-bold text-dark" th:text="${document.name}">receipt.pdf</h4>
                        <div class="d-flex gap-3 mt-1">
                            <span class="text-muted small"><i class="fa-solid fa-hashtag me-1"></i> <span th:text="#{doc.details.id}">ID</span>: <span th:text="${document.id}">12</span></span>
                            <span class="text-muted small"><i class="fa-solid fa-calendar me-1"></i> <span th:text="#{doc.details.created}">Created</span>: <span th:text="${#temporals.format(document.createdAt, 'dd.MM.yyyy')}">01.01.2024</span></span>
                        </div>
                    </div>
                </div>

                <div class="row g-4">
                    <div class="col-md-6">
                        <div class="info-label text-muted small text-uppercase fw-bold mb-1" th:text="#{doc.details.label.type}">Document Type</div>
                        <div class="info-value fw-semibold" th:text="${document.documentType}">RECEIPT</div>
                    </div>
                    <div class="col-md-6">
                        <div class="info-label text-muted small text-uppercase fw-bold mb-1" th:text="#{doc.details.label.owner}">Owner ID</div>
                        <div class="info-value fw-semibold" th:text="${document.userId}">1</div>
                    </div>
                    <div class="col-md-12">
                        <div class="info-label text-muted small text-uppercase fw-bold mb-1" th:text="#{doc.details.label.path}">File Storage Path</div>
                        <div class="info-value font-monospace small bg-light p-2 rounded border" th:text="${document.filePath}">/path/to/file</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-lg-4">
            <div class="actions-panel glass-card p-3 shadow-sm sticky-top" style="top: 20px;">
                <div class="text-muted small text-uppercase fw-bold px-2 mb-3" th:text="#{doc.details.actions}">Actions</div>
                <div class="d-flex flex-column gap-2">
                    <a th:href="@{/documents/upload}" class="btn btn-light text-start border d-flex align-items-center gap-2 py-2 px-3 rounded-3">
                        <i class="fa-solid fa-rotate text-warning"></i>
                        <span th:text="#{doc.details.btn.rescan}">Re-scan document</span>
                    </a>
                    <a th:href="@{/transactions}" class="btn btn-light text-start border d-flex align-items-center gap-2 py-2 px-3 rounded-3">
                        <i class="fa-solid fa-receipt text-warning"></i>
                        <span th:text="#{doc.details.btn.txns}">View transactions</span>
                    </a>
                    <hr class="my-2 opacity-50">

                    <button class="btn btn-outline-danger text-start d-flex align-items-center gap-2 py-2 px-3 rounded-3 border-1"
                            th:onclick="'deleteDocument(' + ${document.id} + ')'">
                        <i class="fa-solid fa-trash"></i>
                        <span class="fw-bold" th:text="#{doc.details.btn.delete}">Delete Document</span>
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<th:block layout:fragment="page-specific-scripts-bottom">
    <script th:inline="javascript">
        const i18n = {
            confirmDelete: [[#{doc.details.js.confirm.delete}]],
            deleteFail: [[#{doc.details.js.delete.fail}]],
            networkError: [[#{doc.details.js.network.error}]]
        };

        async function deleteDocument(id) {
            if (confirm(i18n.confirmDelete)) {
                try {
                    const response = await fetch('/api/documents/' + id, {
                        method: 'DELETE',
                        headers: getAuthHeaders()
                    });

                    if (response.ok) {
                        window.location.href = '/documents';
                    } else {
                        const error = await response.json();
                        showError(error.message || i18n.deleteFail);
                    }
                } catch (e) {
                    showError(i18n.networkError);
                }
            }
        }

        function showError(msg) {
            const box = document.getElementById('errorBox');
            const msgSpan = document.getElementById('errorMsg');
            if (msgSpan) msgSpan.innerText = msg;
            if (box) box.style.display = 'flex';
        }
    </script>
</th:block>
</body>
</html>
