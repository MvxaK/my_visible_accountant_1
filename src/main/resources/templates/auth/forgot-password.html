<!DOCTYPE html>
<html th:lang="${#locale.language}" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout}">
<head>
  <meta charset="UTF-8">
  <title th:text="#{forgot.page.title}">Forgot Password — MVA</title>
  <th:block layout:fragment="page-specific-head">
    <link rel="stylesheet" href="/css/forms.css">
  </th:block>
</head>
<body layout:fragment="content">

<div class="container mt-5">
  <div class="card shadow p-4 rounded" style="max-width: 450px; margin: auto;">
    <h2 class="text-center mb-4 fw-bold text-dark" th:text="#{forgot.header}">Password Recovery</h2>

    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
    <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>

    <p class="text-muted text-center small" th:text="#{forgot.description}">
      Enter your email, and we'll send you a 6-digit code to reset your password.
    </p>

    <form th:action="@{/auth/forgot-password/send}" method="post">
      <div class="mb-3">
        <label for="email" class="form-label" th:text="#{forgot.label.email}">Email Address</label>
        <input type="email" id="email" name="email" class="form-control" th:placeholder="#{forgot.ph.email}" required>
      </div>

      <button type="submit" class="btn btn-warning w-100 fw-semibold mt-2" th:text="#{forgot.btn.submit}">
        Send Code
      </button>
    </form>

    <p class="text-center mt-3">
      <span th:text="#{forgot.footer.remembered}">Remembered your password?</span>
      <a href="/auth/login" th:text="#{forgot.footer.login}">Back to Login</a>
    </p>
  </div>
</div>

</body>
</html>
