<!DOCTYPE html>
<html th:lang="${#locale.language}" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout}">
<head>
  <meta charset="UTF-8">
  <title th:text="#{reset.page.title}">Reset Password — MVA</title>
  <th:block layout:fragment="page-specific-head">
    <link rel="stylesheet" href="/css/forms.css">
  </th:block>
</head>
<body layout:fragment="content">

<div class="container mt-5">
  <div class="card shadow p-4 rounded" style="max-width: 450px; margin: auto;">
    <h2 class="text-center mb-4 fw-bold text-dark" th:text="#{reset.header}">Set New Password</h2>

    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <form th:action="@{/auth/forgot-password/reset}" method="post">
      <input type="hidden" name="email" th:value="${email}">

      <div class="mb-3">
        <label for="code" class="form-label" th:text="#{reset.label.code}">Verification Code</label>
        <input type="text" id="code" name="code" class="form-control text-center fw-bold"
               placeholder="000000" maxlength="6" style="letter-spacing: 5px;" required>
        <div class="form-text" th:text="#{reset.help.code}">Enter the 6-digit code sent to your email.</div>
      </div>

      <div class="mb-3">
        <label for="password" class="form-label" th:text="#{reset.label.password}">New Password</label>
        <input type="password" id="password" name="password" class="form-control"
               th:placeholder="#{reset.ph.password}" minlength="8" required>
      </div>

      <button type="submit" class="btn btn-warning w-100 fw-semibold mt-3" th:text="#{reset.btn.submit}">
        Reset Password
      </button>
    </form>
  </div>
</div>

</body>
</html>
