<!DOCTYPE html>
<html th:lang="${#locale.language}" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout}">
<head>
    <title th:text="#{cat.edit.page.title}">Edit Category — My Visible Accountant</title>
    <th:block layout:fragment="page-specific-head">
        <link rel="stylesheet" href="/css/dashboard.css">
        <link rel="stylesheet" href="/css/categories.css">
    </th:block>
</head>

<body layout:fragment="content">
<div class="container my-5">
    <div class="category-container">

        <div class="mb-4">
            <a th:href="@{/categories}" class="text-muted small text-decoration-none">
                <i class="fa-solid fa-arrow-left me-1"></i> <span th:text="#{cat.edit.back}">Back to list</span>
            </a>
            <div class="page-title mt-2" th:text="#{cat.edit.header}">Edit Category</div>
        </div>

        <div class="glass-card p-4">
            <form id="editCategoryForm">
                <input type="hidden" id="catId" th:value="${category.id}">

                <div class="mb-4">
                    <label for="name" class="form-label" th:text="#{cat.edit.label.name}">Category Name</label>
                    <input type="text" id="name" class="form-control"
                           th:value="${category.name}" required th:placeholder="#{cat.edit.ph.name}">
                </div>

                <div class="mb-4">
                    <label class="form-label" th:text="#{cat.edit.label.type}">Transaction Type</label>
                    <div class="d-flex gap-3">
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="type" id="typeExpense"
                                   value="EXPENSE" th:checked="${category.type.name() == 'EXPENSE'}">
                            <label class="form-check-label" for="typeExpense" th:text="#{cat.edit.type.expense}">Expense</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="type" id="typeIncome"
                                   value="INCOME" th:checked="${category.type.name() == 'INCOME'}">
                            <label class="form-check-label" for="typeIncome" th:text="#{cat.edit.type.income}">Income</label>
                        </div>
                    </div>
                </div>

                <div class="mb-4">
                    <label for="description" class="form-label" th:text="#{cat.edit.label.desc}">Description</label>
                    <textarea id="description" class="form-control" rows="4"
                              th:text="${category.description}" th:placeholder="#{cat.edit.ph.desc}"></textarea>
                </div>

                <div class="d-flex justify-content-between align-items-center pt-3 border-top">
                    <button type="button" class="btn btn-outline-danger" onclick="handleDelete()">
                        <i class="fa-solid fa-trash-can me-1"></i> <span th:text="#{cat.edit.btn.delete}">Delete</span>
                    </button>

                    <div class="d-flex gap-2">
                        <a th:href="@{/categories}" class="btn btn-light" th:text="#{cat.edit.btn.cancel}">Cancel</a>
                        <button type="submit" class="btn btn-warning fw-bold px-4" th:text="#{cat.edit.btn.save}">
                            Save Changes
                        </button>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>

<th:block layout:fragment="page-specific-scripts-bottom">
    <script th:inline="javascript">
        const catId = document.getElementById('catId').value;
        const form = document.getElementById('editCategoryForm');

        const i18n = {
            confirmDelete: [[#{cat.edit.js.confirm.delete}]],
            errorSave: [[#{cat.edit.js.error.save}]],
            errorDelete: [[#{cat.edit.js.error.delete}]],
            connectionError: [[#{cat.edit.js.connection.error}]]
        };

        form.onsubmit = function(e) {
            e.preventDefault();
            const selectedType = document.querySelector('input[name="type"]:checked').value;

            const data = {
                name: document.getElementById('name').value,
                type: selectedType,
                description: document.getElementById('description').value
            };

            fetch(`/api/category/${catId}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            }).then(res => {
                if (res.ok) {
                    window.location.href = '/categories';
                } else {
                    alert(i18n.errorSave);
                }
            }).catch(err => {
                alert(i18n.connectionError);
            });
        };

        function handleDelete() {
            if (confirm(i18n.confirmDelete)) {
                fetch(`/api/category/${catId}`, {
                    method: 'DELETE'
                }).then(res => {
                    if (res.ok) window.location.href = '/categories';
                    else alert(i18n.errorDelete);
                });
            }
        }
    </script>
</th:block>
</body>
</html>
