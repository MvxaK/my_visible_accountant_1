<!DOCTYPE html>
<html th:lang="${#locale.language}" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout}">
<head>
    <title th:text="#{alert.edit.page.title}">Edit Alert — My Visible Accountant</title>
    <th:block layout:fragment="page-specific-head">
        <link rel="stylesheet" href="/css/dashboard.css">
        <link rel="stylesheet" href="/css/alerts.css">
    </th:block>
</head>

<body layout:fragment="content">
<div class="container my-5">
    <div class="alert-container">

        <div class="mb-4">
            <a href="/alerts" class="text-muted small text-decoration-none">
                <i class="fa-solid fa-arrow-left me-1"></i> <span th:text="#{alert.edit.back}">Back to Alerts</span>
            </a>
            <div class="page-title mt-2" th:text="#{alert.edit.header}">Alert Configuration</div>
        </div>

        <div class="glass-card p-4">
            <form id="editAlertForm">
                <input type="hidden" id="alertId" th:value="${alert.id}">

                <div class="row mb-4">
                    <div class="col-md-6">
                        <label class="form-label" th:text="#{alert.edit.label.category}">Category</label>
                        <select id="categoryId" class="form-control" required>
                            <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}" th:selected="${cat.id == alert.categoryId}"></option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label" th:text="#{alert.edit.label.status}">Status</label>
                        <div class="form-check form-switch pt-2">
                            <input class="form-check-input" type="checkbox" id="isActive" th:checked="${alert.isActive}">
                            <label class="form-check-label" for="isActive" th:text="#{alert.edit.enable}">Enable Alert</label>
                        </div>
                    </div>
                </div>

                <div class="row mb-4">
                    <div class="col-md-8">
                        <label class="form-label" th:text="#{alert.edit.label.threshold}">Threshold Amount</label>
                        <input type="number" id="threshold" class="form-control"
                               th:value="${alert.thresholdAmount}" step="0.01" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label" th:text="#{alert.edit.label.currency}">Currency</label>
                        <select id="currency" class="form-control">
                            <option th:each="curr : ${T(org.cook.extracter.model.Currency).values()}" th:value="${curr}" th:text="${curr}" th:selected="${curr == alert.currency}"></option>
                        </select>
                    </div>
                </div>

                <div class="d-flex justify-content-between pt-3">
                    <button type="button" class="btn btn-outline-danger" onclick="deleteAndRedirect()">
                        <i class="fa-solid fa-trash me-2"></i> <span th:text="#{alert.edit.btn.delete}">Delete Rule</span>
                    </button>
                    <div>
                        <a href="/alerts" class="btn btn-light me-2" th:text="#{alert.edit.btn.cancel}">Cancel</a>
                        <button type="submit" class="btn btn-warning" th:text="#{alert.edit.btn.save}">Save Settings</button>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>

<th:block layout:fragment="page-specific-scripts-bottom">
    <script th:inline="javascript">
        const alertId = document.getElementById('alertId').value;
        const i18n = {
            confirmDelete: [[#{alert.edit.js.confirm.delete}]]
        };

        document.getElementById('editAlertForm').onsubmit = function(e) {
            e.preventDefault();
            const data = {
                categoryId: document.getElementById('categoryId').value,
                thresholdAmount: document.getElementById('threshold').value,
                currency: document.getElementById('currency').value,
                isActive: document.getElementById('isActive').checked
            };

            fetch(`/api/alert_rules/${alertId}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            }).then(res => {
                if (res.ok) window.location.href = '/alerts';
            });
        };

        function deleteAndRedirect() {
            if (confirm(i18n.confirmDelete)) {
                fetch(`/api/alert_rules/${alertId}`, { method: 'DELETE' })
                    .then(res => {
                        if (res.ok) window.location.href = '/alerts';
                    });
            }
        }
    </script>
</th:block>
</body>
</html>
