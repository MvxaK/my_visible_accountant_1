<!DOCTYPE html>
<html th:lang="${#locale.language}" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout}">
<head>
    <title th:text="#{alerts.page.title}">Alerts — My Visible Accountant</title>
    <th:block layout:fragment="page-specific-head">
        <link rel="stylesheet" href="/css/dashboard.css">
        <link rel="stylesheet" href="/css/alerts.css">
    </th:block>
</head>

<body layout:fragment="content">
<div class="container my-4">
    <div class="page-header mb-4">
        <div class="page-title" th:text="#{alerts.header}">Spending Alerts</div>
        <div class="page-subtitle" th:text="#{alerts.subtitle}">Personal threshold rules for your categories</div>
    </div>

    <div class="glass-card p-4 mb-4">
        <form id="quickCreateAlert" class="row g-3 align-items-end">
            <div class="col-md-3">
                <label class="form-label" th:text="#{alerts.label.category}">Category</label>
                <select id="newCategoryId" class="form-select" required>
                    <option value="" disabled selected th:text="#{alerts.ph.choose.cat}">Choose category...</option>
                    <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}"></option>
                </select>
            </div>
            <div class="col-md-3">
                <label class="form-label" th:text="#{alerts.label.threshold}">Limit Amount</label>
                <input type="number" id="newThreshold" class="form-control" placeholder="0.00" step="0.01" required>
            </div>
            <div class="col-md-2">
                <label class="form-label" th:text="#{alerts.label.currency}">Currency</label>
                <select id="newCurrency" class="form-select">
                    <option th:each="curr : ${T(org.cook.extracter.model.Currency).values()}" th:value="${curr}" th:text="${curr}"></option>
                </select>
            </div>
            <div class="col-md-2">
                <div class="form-check form-switch mb-2">
                    <input class="form-check-input" type="checkbox" id="newIsActive" checked>
                    <label class="form-check-label small fw-bold text-muted text-uppercase" for="newIsActive" th:text="#{alerts.label.active}">ACTIVE</label>
                </div>
            </div>
            <div class="col-md-2">
                <button type="submit" class="btn btn-warning w-100" th:text="#{alerts.btn.create}">Create</button>
            </div>
        </form>
    </div>

    <div class="glass-card overflow-hidden">
        <table class="table table-borderless mb-0">
            <thead class="bg-light">
            <tr>
                <th class="ps-4" th:text="#{alerts.table.category}">Category</th>
                <th th:text="#{alerts.table.threshold}">Threshold</th>
                <th th:text="#{alerts.table.status}">Status</th>
                <th class="text-end pe-4" th:text="#{alerts.table.actions}">Actions</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="alert : ${alerts}" th:id="'alert-row-' + ${alert.id}" class="border-bottom">
                <td class="ps-4 py-3">
                    <a th:href="@{/alerts/{id}/edit(id=${alert.id})}" class="alert-category-name">
                        <i class="fa-solid fa-circle-dot me-2 text-warning"></i>
                        <th:block th:each="cat : ${categories}">
                            <span th:if="${cat.id == alert.categoryId}" th:text="${cat.name}">Category Name</span>
                        </th:block>
                        <span th:if="${alert.categoryId == null}" class="text-muted" th:text="#{alerts.no.category}">No Category</span>
                    </a>
                </td>
                <td class="py-3">
                    <span class="threshold-value" th:text="${#numbers.formatDecimal(alert.thresholdAmount, 1, 'COMMA', 2, 'POINT')}"></span>
                    <span class="currency-label" th:text="${alert.currency}"></span>
                </td>
                <td class="py-3">
                    <span th:class="${alert.isActive} ? 'status-badge status-active' : 'status-badge status-inactive'"
                          th:text="${alert.isActive} ? #{alerts.status.active} : #{alerts.status.disabled}">
                        Active
                    </span>
                </td>
                <td class="text-end pe-4 py-3">
                    <a th:href="@{/alerts/{id}/edit(id=${alert.id})}" class="btn btn-sm btn-light border" th:title="#{alerts.btn.edit}">
                        <i class="fa-solid fa-eye"></i>
                    </a>
                    <button class="btn btn-sm btn-outline-danger" th:onclick="'deleteAlert(' + ${alert.id} + ')'" th:title="#{alerts.btn.delete}">
                        <i class="fa-solid fa-trash"></i>
                    </button>
                </td>
            </tr>
            <tr th:if="${alerts == null or alerts.isEmpty()}">
                <td colspan="4" class="text-center py-5 text-muted" th:text="#{alerts.table.empty}">No alerts configured.</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<th:block layout:fragment="page-specific-scripts-bottom">
    <script th:inline="javascript">
        const i18n = {
            confirmDelete: [[#{alerts.js.confirm.delete}]],
            errorDelete: [[#{alerts.js.error.delete}]],
            errorCreate: [[#{alerts.js.error.create}]]
        };

        document.getElementById('quickCreateAlert').onsubmit = function(e) {
            e.preventDefault();

            const data = {
                categoryId: document.getElementById('newCategoryId').value,
                thresholdAmount: document.getElementById('newThreshold').value,
                currency: document.getElementById('newCurrency').value,
                isActive: document.getElementById('newIsActive').checked
            };

            fetch('/api/alert_rules', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            }).then(res => {
                if (res.ok) {
                    location.reload();
                } else {
                    alert(i18n.errorCreate);
                }
            });
        };

        function deleteAlert(id) {
            if (confirm(i18n.confirmDelete)) {
                fetch(`/api/alert_rules/${id}`, { method: 'DELETE' })
                    .then(res => {
                        if (res.ok) {
                            const row = document.getElementById(`alert-row-${id}`);
                            if(row) row.remove();
                        } else {
                            alert(i18n.errorDelete);
                        }
                    });
            }
        }
    </script>
</th:block>
</body>
</html>
