<!DOCTYPE html>
<html th:lang="${#locale.language}" xmlns:th="http://www.thymeleaf.org" layout:decorate="~{layout}" xmlns:layout="http://www.w3.org/1999/xhtml">
<head>
    <title th:text="#{admin.page.title}">Admin Dashboard — My Visible Accountant</title>
</head>
<body>
<main layout:fragment="content">
    <div class="container py-5">
        <h2 class="fw-bold mb-4" th:text="#{admin.header}">Admin Dashboard</h2>

        <div class="row g-4">
            <div class="col-md-4">
                <div class="card border-0 shadow-sm h-100">
                    <div class="card-body text-center p-4">
                        <div class="display-5 text-warning mb-2"><i class="bi bi-people"></i></div>
                        <h5 class="text-muted" th:text="#{admin.stat.users}">Users</h5>
                        <h2 class="fw-bold" th:text="${userCount}">0</h2>
                        <a href="/admin/users" class="btn btn-outline-dark btn-sm mt-3" th:text="#{admin.btn.manage.users}">Manage Users</a>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card border-0 shadow-sm h-100">
                    <div class="card-body text-center p-4">
                        <div class="display-5 text-success mb-2"><i class="bi bi-cash-stack"></i></div>
                        <h5 class="text-muted" th:text="#{admin.stat.transactions}">Transactions</h5>
                        <h2 class="fw-bold" th:text="${transactionCount}">0</h2>
                        <a href="/admin/transactions" class="btn btn-outline-dark btn-sm mt-3" th:text="#{admin.btn.view.all}">View All</a>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card border-0 shadow-sm h-100">
                    <div class="card-body text-center p-4">
                        <div class="display-5 text-info mb-2"><i class="bi bi-file-earmark-text"></i></div>
                        <h5 class="text-muted" th:text="#{admin.stat.documents}">Documents</h5>
                        <h2 class="fw-bold" th:text="${documentCount}">0</h2>
                        <a href="/admin/documents" class="btn btn-outline-dark btn-sm mt-3" th:text="#{admin.btn.manage.docs}">Manage Docs</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>
</body>
</html>
